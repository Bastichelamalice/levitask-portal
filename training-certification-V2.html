<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Levitask — Training & Certification</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:#0a0a0a; --off-black:#111111; --surface:#161616; --surface-2:#1e1e1e;
    --border:#2a2a2a; --border-light:#333333;
    --text-primary:#f0ece4; --text-secondary:#8a8480; --text-muted:#4a4744;
    --accent:#e8622a; --accent-dim:rgba(232,98,42,0.12); --accent-glow:rgba(232,98,42,0.06);
    --green:#4a7c59; --green-bright:#6dbf86; --green-dim:rgba(74,124,89,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--text-primary); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:flex; overflow-x:hidden; }

  /* ─── SIDEBAR ─────────────────────────────────────────────── */
  .sidebar { width:240px; min-height:100vh; background:var(--off-black); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; left:0; top:0; bottom:0; z-index:100; overflow-y:auto; }
  .sidebar::-webkit-scrollbar { width:3px; }
  .sidebar::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:2px; }
  .sidebar-logo { padding:32px 28px 28px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .sidebar-logo img { height:28px; filter:brightness(0) invert(1); opacity:0.9; }
  .sidebar-logo .portal-label { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); margin-top:8px; font-weight:400; }
  .sidebar-nav { padding:24px 16px; flex:1; }
  .nav-section-label { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); padding:0 12px; margin-bottom:8px; margin-top:20px; }
  .nav-section-label:first-child { margin-top:0; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:6px; font-size:13px; font-weight:400; color:var(--text-secondary); cursor:pointer; transition:all 0.2s; text-decoration:none; margin-bottom:2px; }
  .nav-item:hover { background:var(--surface); color:var(--text-primary); }
  .nav-item.active { background:var(--accent-dim); color:var(--accent); border:1px solid rgba(232,98,42,0.15); }
  .nav-icon { width:16px; height:16px; opacity:0.7; flex-shrink:0; }
  .nav-item.active .nav-icon { opacity:1; }
  .sidebar-footer { padding:20px 16px; border-top:1px solid var(--border); }
  .distributor-badge { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--surface); border-radius:8px; border:1px solid var(--border); }
  .distributor-avatar { width:32px; height:32px; background:var(--accent-dim); border-radius:50%; border:1px solid rgba(232,98,42,0.3); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; color:var(--accent); flex-shrink:0; }
  .distributor-name { font-size:12px; font-weight:500; color:var(--text-primary); }
  .distributor-role { font-size:10px; color:var(--text-muted); margin-top:1px; }

  /* ─── MAIN ────────────────────────────────────────────────── */
  .main { margin-left:240px; flex:1; display:flex; flex-direction:column; min-height:100vh; }
  .topbar { padding:20px 40px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--off-black); position:sticky; top:0; z-index:50; }
  .topbar-left { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:300; letter-spacing:0.02em; }
  .topbar-left span { color:var(--text-muted); font-style:italic; }
  .topbar-right { font-size:12px; color:var(--text-muted); }

  /* ─── APP CONTAINER ───────────────────────────────────────── */
  #app { flex:1; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .view-anim { animation:fadeUp 0.22s ease both; }

  /* ─── HOME VIEW ───────────────────────────────────────────── */
  .home-wrap { max-width:860px; padding:56px 64px 64px; }
  .v-eyebrow { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; font-weight:400; }
  .v-title { font-family:'Cormorant Garamond',serif; font-size:48px; font-weight:300; line-height:1.1; margin-bottom:32px; letter-spacing:0.01em; }
  .welcome-block { border-left:3px solid var(--accent); background:var(--surface); border-radius:0 8px 8px 0; padding:20px 24px; margin-bottom:32px; }
  .welcome-block p { font-size:13px; color:var(--text-secondary); line-height:1.7; margin-bottom:12px; font-weight:300; }
  .welcome-block p:last-of-type { margin-bottom:20px; }
  .btn-primary { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; background:var(--accent); color:white; border:none; border-radius:6px; font-size:13px; font-weight:400; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.2s; }
  .btn-primary:hover { opacity:0.88; }
  .btn-secondary { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; background:transparent; color:var(--text-secondary); border:1px solid var(--border); border-radius:6px; font-size:13px; font-weight:400; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .btn-secondary:hover { border-color:var(--border-light); color:var(--text-primary); }
  .progress-block { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px 24px; margin-bottom:32px; }
  .progress-block-label { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }
  .progress-bar-row { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .progress-bar-track { flex:1; height:4px; background:var(--border); border-radius:2px; }
  .progress-bar-fill { height:4px; background:var(--accent); border-radius:2px; transition:width 0.5s ease; }
  .progress-pct { font-size:12px; color:var(--accent); font-weight:500; white-space:nowrap; }
  .progress-detail { font-size:11px; color:var(--text-muted); margin-bottom:16px; }

  /* stepper */
  .stepper-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px 28px; margin-bottom:40px; }
  .stepper-wrap-label { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-muted); margin-bottom:20px; }
  .st-row { display:flex; align-items:stretch; gap:12px; }
  .st-icol { width:28px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; }
  .st-dot { width:28px; height:28px; border-radius:50%; border:1.5px solid; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .st-dot.video { background:var(--accent-dim); border-color:var(--accent); }
  .st-dot.reading { background:var(--surface-2); border-color:var(--border-light); }
  .st-con { width:1px; flex:1; min-height:8px; }
  .st-con.solid { background:var(--border); }
  .st-con.dashed { border-left:1px dashed #3a3a3a; }
  .st-text { display:flex; align-items:center; font-size:13px; color:var(--text-secondary); min-height:28px; padding-bottom:10px; }
  .st-lbl-full { font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); font-weight:500; padding:4px 0 8px; }
  .st-quiz-dot { width:28px; height:28px; border-radius:50%; background:var(--accent); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .st-quiz-dot svg { width:13px; height:13px; stroke:white; fill:none; stroke-width:2.5; }
  .st-quiz-content { flex:1; background:var(--accent-dim); border:1px solid rgba(232,98,42,0.2); border-radius:8px; padding:12px 16px; }
  .st-quiz-title { font-size:12px; font-weight:500; color:var(--accent); margin-bottom:2px; }
  .st-quiz-meta { font-size:11px; color:var(--text-secondary); }

  /* module cards */
  .section-label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; font-weight:400; }
  .module-card { display:flex; align-items:center; gap:16px; padding:20px 24px; background:var(--surface); border:1px solid var(--border); border-radius:10px; cursor:pointer; transition:all 0.2s; margin-bottom:8px; }
  .module-card:hover { border-color:var(--border-light); background:var(--surface-2); }
  .module-card.m-active { border-color:rgba(232,98,42,0.35); background:var(--accent-glow); }
  .module-card.m-done { border-color:rgba(74,124,89,0.35); background:var(--green-dim); }
  .module-card.m-locked { opacity:0.35; cursor:not-allowed; pointer-events:none; }
  .mc-num { width:38px; height:38px; border-radius:50%; border:1.5px solid var(--border-light); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:400; color:var(--text-muted); flex-shrink:0; font-family:'Cormorant Garamond',serif; }
  .module-card.m-active .mc-num { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); }
  .module-card.m-done .mc-num { border-color:var(--green); background:var(--green-dim); color:var(--green-bright); }
  .mc-info { flex:1; min-width:0; }
  .mc-name { font-size:14px; font-weight:400; color:var(--text-primary); margin-bottom:3px; }
  .mc-meta { font-size:11px; color:var(--text-muted); }
  .mc-right { display:flex; align-items:center; gap:12px; }
  .mc-badge { font-size:10px; padding:3px 9px; border-radius:3px; white-space:nowrap; }
  .mc-badge.b-locked { background:var(--surface-2); color:var(--text-muted); border:1px solid var(--border); }
  .mc-badge.b-progress { background:var(--accent-dim); color:var(--accent); border:1px solid rgba(232,98,42,0.2); }
  .mc-badge.b-done { background:var(--green-dim); color:var(--green-bright); border:1px solid rgba(74,124,89,0.3); }
  .mc-arrow { color:var(--text-muted); font-size:18px; opacity:0.5; }
  .module-card.m-active .mc-arrow, .module-card.m-done .mc-arrow { opacity:0.8; }

  /* cert card */
  .cert-card-home { display:flex; align-items:center; gap:16px; padding:16px 20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-top:24px; opacity:0.4; }
  .cert-card-home.unlocked { opacity:1; cursor:pointer; transition:all 0.2s; }
  .cert-card-home.unlocked:hover { border-color:var(--border-light); }
  .cert-star-circle { width:36px; height:36px; border-radius:50%; border:1.5px solid var(--border-light); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .cert-star-circle svg { width:16px; height:16px; stroke:var(--text-muted); fill:none; stroke-width:1.5; }
  .cert-card-home.unlocked .cert-star-circle { border-color:rgba(255,200,0,0.4); background:rgba(255,200,0,0.06); }
  .cert-card-home.unlocked .cert-star-circle svg { stroke:#f5c518; }
  .cert-home-info { flex:1; }
  .cert-home-title { font-size:13px; font-weight:400; color:var(--text-primary); margin-bottom:3px; }
  .cert-home-meta { font-size:11px; color:var(--text-muted); }

  /* ─── MODULE OVERVIEW VIEW ────────────────────────────────── */
  .mo-wrap { max-width:760px; padding:40px 48px 64px; }
  .mo-back { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); cursor:pointer; margin-bottom:28px; transition:color 0.2s; }
  .mo-back:hover { color:var(--text-secondary); }
  .mo-back svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; }
  .mo-header { margin-bottom:32px; padding-bottom:24px; border-bottom:1px solid var(--border); }
  .mo-badge-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .mo-badge { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); background:var(--accent-dim); padding:3px 10px; border-radius:3px; border:1px solid rgba(232,98,42,0.2); }
  .mo-status { font-size:11px; color:var(--text-muted); }
  .mo-status.s-progress { color:var(--accent); }
  .mo-status.s-done { color:var(--green-bright); }
  .mo-title { font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:300; line-height:1.1; margin-bottom:10px; }
  .mo-lead { font-size:13px; color:var(--text-secondary); line-height:1.7; font-weight:300; max-width:580px; margin-bottom:16px; }
  .mo-meta-row { display:flex; align-items:center; gap:20px; }
  .mo-meta-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); }
  .mo-meta-item svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.5; opacity:0.7; }

  /* what you will learn */
  .learn-block { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px 28px; margin-bottom:32px; }
  .learn-label { font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:16px; font-weight:400; }
  .learn-cols { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .learn-col-title { font-size:11px; font-weight:500; color:var(--text-primary); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:10px; }
  .learn-item { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--text-secondary); padding:5px 0; border-bottom:1px solid var(--border); line-height:1.5; font-weight:300; }
  .learn-item:last-child { border-bottom:none; }
  .learn-dot { width:4px; height:4px; border-radius:50%; background:var(--accent); flex-shrink:0; margin-top:6px; }

  /* section cards */
  .sc-label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }
  .section-card { display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:all 0.2s; margin-bottom:8px; }
  .section-card:hover { border-color:var(--border-light); }
  .section-card.sc-active { border-color:rgba(232,98,42,0.3); }
  .section-card.sc-done { border-color:rgba(74,124,89,0.3); }
  .section-card.sc-locked { opacity:0.35; cursor:not-allowed; pointer-events:none; }
  .sc-num { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--border-light); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-muted); flex-shrink:0; }
  .section-card.sc-active .sc-num { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); }
  .section-card.sc-done .sc-num { border-color:var(--green); background:var(--green-dim); color:var(--green-bright); }
  .sc-info { flex:1; }
  .sc-title { font-size:13px; font-weight:400; color:var(--text-primary); margin-bottom:5px; }
  .sc-pills { display:flex; align-items:center; gap:6px; }
  .sc-pill { font-size:9px; padding:2px 8px; border-radius:3px; letter-spacing:0.06em; }
  .pill-video { background:var(--accent-dim); color:var(--accent); border:1px solid rgba(232,98,42,0.2); }
  .pill-reading { background:var(--surface-2); color:var(--text-muted); border:1px solid var(--border); }
  .sc-time { font-size:11px; color:var(--text-muted); }
  .section-card.sc-done .sc-pill { background:var(--green-dim); color:var(--green-bright); border-color:rgba(74,124,89,0.3); }
  .sc-arrow { color:var(--text-muted); font-size:16px; opacity:0.4; }

  /* quiz card in module overview */
  .quiz-card-mo { display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-top:4px; opacity:0.4; }
  .quiz-card-mo.unlocked { opacity:1; cursor:pointer; transition:all 0.2s; border-color:rgba(232,98,42,0.2); background:var(--accent-glow); }
  .quiz-card-mo.unlocked:hover { border-color:rgba(232,98,42,0.4); }
  .qc-icon { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--border-light); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .quiz-card-mo.unlocked .qc-icon { border-color:var(--accent); background:var(--accent-dim); }
  .qc-icon svg { width:14px; height:14px; stroke:var(--text-muted); fill:none; stroke-width:2; }
  .quiz-card-mo.unlocked .qc-icon svg { stroke:var(--accent); }
  .qc-info { flex:1; }
  .qc-title { font-size:13px; font-weight:400; color:var(--text-primary); margin-bottom:3px; }
  .qc-meta { font-size:11px; color:var(--text-muted); }
  .quiz-card-mo.unlocked .qc-meta { color:var(--text-secondary); }

  /* module overview bottom bar */
  .mo-bottom { display:flex; align-items:center; justify-content:space-between; padding:24px 0; margin-top:24px; border-top:1px solid var(--border); }

  /* ─── QUIZ VIEW ───────────────────────────────────────────── */
  .quiz-wrap { max-width:760px; padding:48px 64px 64px; }
  .quiz-header { margin-bottom:28px; padding-bottom:24px; border-bottom:1px solid var(--border); }
  .quiz-title { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:300; line-height:1.1; margin:12px 0 10px; }
  .quiz-desc { font-size:13px; color:var(--text-secondary); line-height:1.6; font-weight:300; margin-bottom:16px; }
  .quiz-rules { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .quiz-rule { font-size:11px; color:var(--text-muted); background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:4px 10px; }
  .q-dots-row { display:flex; align-items:center; margin-bottom:28px; }
  .q-dot { width:32px; height:32px; border-radius:50%; border:1.5px solid var(--border-light); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:400; color:var(--text-muted); flex-shrink:0; transition:all 0.2s; background:var(--surface); }
  .q-dot.q-active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .q-dot.q-correct { border-color:var(--green); color:var(--green-bright); background:var(--green-dim); }
  .q-dot.q-wrong { border-color:#c0392b; color:#e57373; background:rgba(192,57,43,0.1); }
  .q-connector { flex:1; height:1px; background:var(--border); min-width:12px; max-width:32px; }
  .question-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:28px; margin-bottom:20px; }
  .q-label { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; }
  .q-text { font-size:16px; font-weight:400; color:var(--text-primary); line-height:1.5; margin-bottom:22px; }
  .options { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
  .option { display:flex; align-items:center; gap:14px; padding:13px 16px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:all 0.15s; user-select:none; }
  .option:hover { border-color:var(--border-light); }
  .option.opt-selected { border-color:var(--accent); background:var(--accent-glow); }
  .option.opt-correct { border-color:var(--green); background:var(--green-dim); cursor:default; }
  .option.opt-wrong { border-color:#c0392b; background:rgba(192,57,43,0.08); cursor:default; }
  .opt-letter { width:26px; height:26px; border-radius:50%; border:1.5px solid var(--border-light); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; color:var(--text-muted); flex-shrink:0; }
  .option.opt-selected .opt-letter { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .option.opt-correct .opt-letter { border-color:var(--green); color:var(--green-bright); background:var(--green-dim); }
  .option.opt-wrong .opt-letter { border-color:#c0392b; color:#e57373; background:rgba(192,57,43,0.12); }
  .opt-text { font-size:13px; color:var(--text-secondary); line-height:1.4; font-weight:300; }
  .option.opt-correct .opt-text { color:var(--text-primary); }
  .quiz-actions { display:flex; justify-content:flex-end; }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
  .quiz-result { border-radius:10px; padding:28px 32px; margin-bottom:28px; display:flex; align-items:center; gap:24px; }
  .quiz-result.pass { background:var(--green-dim); border:1px solid rgba(74,124,89,0.35); }
  .quiz-result.fail { background:rgba(192,57,43,0.06); border:1px solid rgba(192,57,43,0.25); }
  .result-icon { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .quiz-result.pass .result-icon { background:rgba(74,124,89,0.2); border:1.5px solid rgba(74,124,89,0.4); }
  .quiz-result.fail .result-icon { background:rgba(192,57,43,0.12); border:1.5px solid rgba(192,57,43,0.3); }
  .result-icon svg { width:22px; height:22px; }
  .result-info { flex:1; }
  .result-title { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:300; margin-bottom:4px; }
  .quiz-result.pass .result-title { color:var(--green-bright); }
  .quiz-result.fail .result-title { color:#e57373; }
  .result-score { font-size:13px; font-weight:400; margin-bottom:4px; }
  .quiz-result.pass .result-score { color:var(--text-primary); }
  .quiz-result.fail .result-score { color:var(--text-secondary); }

let examState = {
  questions: [],
  answers: {},
  score: 0,
  passed: false,
  done: false,
  timeLeft: 3600
};

let certTimer = null;

function startCertTimer() {
  clearCertTimer();
  certTimer = setInterval(() => {
    examState.timeLeft = Math.max(0, examState.timeLeft - 1);
    const el = document.getElementById('cert-timer');
    if (el) {
      const m = Math.floor(examState.timeLeft / 60);
      const s = examState.timeLeft % 60;
      el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      if (examState.timeLeft <= 300) el.style.color = 'var(--accent)';
    }
    if (examState.timeLeft <= 0) {
      clearCertTimer();
      submitExam();
    }
  }, 1000);
}

function clearCertTimer() {
  if (certTimer) { clearInterval(certTimer); certTimer = null; }
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExam() {
  examState = { questions: shuffleArray(CERT_QUESTIONS).slice(0, 50), answers: {}, score: 0, passed: false, done: false, timeLeft: 3600 };
  state.view = 'cert-exam';
  render();
  startCertTimer();
}

function submitExam() {
  clearCertTimer();
  let score = 0;
  examState.questions.forEach((q, qi) => {
    const selected = (examState.answers[qi] || []).slice().sort().join(',');
    const correct = q.correct.slice().sort().join(',');
    if (selected === correct) score++;
  });
  examState.score = score;
  const totalQuestions = examState.questions.length;
  const passThreshold = Math.ceil(totalQuestions * 0.9);
  examState.passed = score >= passThreshold;
  examState.done = true;
  state.view = 'cert-result';
  render();
}

function updateAnsweredCount() {
  const el = document.getElementById('cert-answered-count');
  if (!el) return;
  const count = Object.keys(examState.answers).filter(k => (examState.answers[k] || []).length > 0).length;
  el.textContent = `${count} of ${examState.questions.length} questions answered`;
}

function updateCertOption(qi, oi) {
  const block = document.querySelector(`[data-qi="${qi}"]`);
  if (!block) return;
  const selected = examState.answers[qi] || [];
  block.querySelectorAll('.cert-option').forEach((optEl, i) => {
    const isSel = selected.includes(i);
    optEl.classList.toggle('selected', isSel);
    const marker = optEl.querySelector('.cert-option-marker');
    if (marker) {
      marker.style.borderColor = isSel ? 'var(--accent)' : '';
      marker.style.background = isSel ? 'var(--accent)' : '';
    }
  });
  updateAnsweredCount();
}

function getCertId() {
  let id = localStorage.getItem('levitask_cert_id');
  if (!id) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let rand = '';
    for (let i = 0; i < 6; i++) rand += chars[Math.floor(Math.random() * chars.length)];
    id = `LVT-${new Date().getFullYear()}-${rand}`;
    localStorage.setItem('levitask_cert_id', id);
  }
  return id;
}

const STORAGE_KEY = 'lv_training_progress';

let state = {
  view: 'home',       // 'home' | 'module-overview' | 'section' | 'quiz' | 'recap' | 'cert-intro' | 'cert-exam' | 'cert-result' | 'cert'
  module: 1,
  section: 1
};

let quizState = { currentQ: 0, selected: null, confirmed: false, score: 0, answers: [], done: false };

function initProgress() {
  const mp = {};
  for (let i = 1; i <= 5; i++) {
    mp[i] = { status: 'not-started', sectionsCompleted: [], quizScore: null };
  }
  return { moduleProgress: mp, currentModule: 1, currentSection: 1 };
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return initProgress();
    const parsed = JSON.parse(raw);
    // ensure all modules exist
    for (let i = 1; i <= 5; i++) {
      if (!parsed.moduleProgress[i]) {
        parsed.moduleProgress[i] = { status: 'not-started', sectionsCompleted: [], quizScore: null };
      }
    }
    return parsed;
  } catch (e) {
    return initProgress();
  }
}

function saveProgress(progress) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) {}
}

let progress = loadProgress();

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function isModuleUnlocked(moduleId) {
  if (moduleId === 1) return true;
  return progress.moduleProgress[moduleId - 1].status === 'completed';
}

function totalSectionsCompleted() {
  let total = 0;
  for (let i = 1; i <= 5; i++) {
    total += (progress.moduleProgress[i].sectionsCompleted || []).length;
  }
  return total;
}

function overallPct() {
  return Math.round((totalSectionsCompleted() / 15) * 100);
}

function hasStarted() {
  for (let i = 1; i <= 5; i++) {
    if (progress.moduleProgress[i].status !== 'not-started') return true;
  }
  return false;
}

function currentActiveModule() {
  // Find first in-progress, or first not-started that's unlocked
  for (let i = 1; i <= 5; i++) {
    if (progress.moduleProgress[i].status === 'in-progress') return i;
  }
  for (let i = 1; i <= 5; i++) {
    if (isModuleUnlocked(i) && progress.moduleProgress[i].status === 'not-started') return i;
  }
  return 1;
}

function firstIncompleteSection(moduleId) {
  const mp = progress.moduleProgress[moduleId];
  for (let s = 1; s <= 3; s++) {
    if (!(mp.sectionsCompleted || []).includes(s)) return s;
  }
  return 1;
}

function moduleStatusClass(moduleId) {
  const s = progress.moduleProgress[moduleId].status;
  if (!isModuleUnlocked(moduleId)) return 'm-locked';
  if (s === 'completed') return 'm-done';
  if (s === 'in-progress') return 'm-active';
  return '';
}

function moduleBadgeHtml(moduleId) {
  const s = progress.moduleProgress[moduleId].status;
  if (!isModuleUnlocked(moduleId)) return '<span class="mc-badge b-locked">Locked</span>';
  if (s === 'completed') return '<span class="mc-badge b-done">✓ Completed</span>';
  if (s === 'in-progress') return '<span class="mc-badge b-progress">In progress</span>';
  return '<span class="mc-badge b-locked">Not started</span>';
}

function sectionStatusClass(moduleId, sectionId) {
  if (!isModuleUnlocked(moduleId)) return 'sc-locked';
  const completed = progress.moduleProgress[moduleId].sectionsCompleted || [];
  if (completed.includes(sectionId)) return 'sc-done';
  // unlock only if previous section completed (or it's section 1)
  if (sectionId === 1) return 'sc-active';
  if (completed.includes(sectionId - 1)) return 'sc-active';
  return 'sc-locked';
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────

function goHome() {
  state.view = 'home';
  render();
}

function goModuleOverview(moduleId) {
  if (!isModuleUnlocked(moduleId)) return;
  state.view = 'module-overview';
  state.module = moduleId;
  progress.currentModule = moduleId;
  saveProgress(progress);
  render();
}

function goSection(moduleId, sectionId) {
  if (!isModuleUnlocked(moduleId)) return;
  state.view = 'section';
  state.module = moduleId;
  state.section = sectionId;
  progress.currentModule = moduleId;
  progress.currentSection = sectionId;
  // Mark module as in-progress if not already started/completed
  if (progress.moduleProgress[moduleId].status === 'not-started') {
    progress.moduleProgress[moduleId].status = 'in-progress';
  }
  saveProgress(progress);
  render();
}

function startModule(moduleId) {
  const s = firstIncompleteSection(moduleId);
  goSection(moduleId, s);
}

function render() {
  if (state.view !== 'cert-exam') clearCertTimer();
  window.scrollTo(0, 0);
  updateTopbar();
  const app = document.getElementById('app');
  app.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'view-anim';
  el.style.flex = '1';

  switch (state.view) {
    case 'home':            el.innerHTML = renderHome(); break;
    case 'module-overview': el.innerHTML = renderModuleOverview(); break;
    case 'section':         el.innerHTML = renderSection(); break;
    case 'quiz':            el.innerHTML = renderQuiz(); break;
    case 'recap':           el.innerHTML = renderRecap(); break;
    case 'cert-intro':      el.innerHTML = renderCertIntro(); break;
    case 'cert-exam':       el.innerHTML = renderCertExam(); break;
    case 'cert-result':     el.innerHTML = renderCertResult(); break;
    case 'cert':            el.innerHTML = renderCert(); break;
  }
  app.appendChild(el);
  attachListeners();
  if (state.view === 'cert-exam') startCertTimer();
}

function updateTopbar() {
  const el = document.getElementById('topbar-right');
  if (state.view === 'home') {
    if (hasStarted()) {
      const m = currentActiveModule();
      const mp = progress.moduleProgress[m];
      const statusText = mp.status === 'completed' ? 'Completed' : 'In progress';
      el.textContent = `Module ${m} of 5 · ${statusText}`;
    } else {
      el.textContent = '';
    }
  } else if (state.view === 'module-overview') {
    el.textContent = `Training › Module ${state.module}`;
  } else if (state.view === 'section') {
    el.textContent = `Training › Module ${state.module} › Section ${state.module}.${state.section}`;
  } else if (state.view === 'quiz') {
    el.textContent = `Training › Module ${state.module} › Quiz`;
  } else if (state.view === 'recap') {
    el.textContent = `Training › Module ${state.module} › Recap`;
  } else if (state.view === 'cert-intro') {
    el.textContent = 'Certification › Overview';
  } else if (state.view === 'cert-exam') {
    el.textContent = 'Certification › Exam';
  } else if (state.view === 'cert-result') {
    el.textContent = 'Certification › Results';
  } else if (state.view === 'cert') {
    el.textContent = 'Certification › Certificate';
  }
}

// ─── QUIZ PLACEHOLDER ────────────────────────────────────────────────────────

function renderQuiz() {
  const m = MODULES.find(x => x.id === state.module);
  const questions = QUIZZES[state.module] || [];
  const qs = quizState;
  const letters = ['A','B','C','D'];

  // ── Result panel (after all questions answered) ──
  if (qs.done) {
    const passed = qs.score >= 4;
    const nextM = MODULES.find(x => x.id === state.module + 1);
    return `
      <div class="quiz-wrap">
        <div class="quiz-header">
          <div class="mo-badge">Module ${state.module} Quiz</div>
          <div class="quiz-title">${m.title} — Quiz</div>
        </div>
        <div class="quiz-result ${passed ? 'pass' : 'fail'}">
          <div class="result-icon">
            ${passed
              ? `<svg viewBox="0 0 24 24" fill="none" stroke="#6dbf86" stroke-width="2.5"><path d="M5 12l5 5 9-9"/></svg>`
              : `<svg viewBox="0 0 24 24" fill="none" stroke="#e57373" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>`}
          </div>
          <div class="result-info">
            <div class="result-title">${passed ? `Module ${state.module} complete.` : 'Not quite.'}</div>
            <div class="result-score">${qs.score} out of 5 correct</div>
            <div class="result-desc">${passed
              ? (state.module < 5 ? `Well done. Module ${state.module + 1} is now unlocked.` : 'Well done. You have completed all modules.')
              : 'You need 4 out of 5 to move on. Review the sections and try again.'}</div>
          </div>
        </div>
        <div class="result-actions">
          ${passed
            ? (state.module < 5
                ? `<button class="btn-primary" data-action="go-recap">Continue to Module ${state.module + 1} →</button>`
                : `<button class="btn-primary" data-action="go-recap">View results →</button>`)
            : `<button class="btn-primary" data-action="quiz-retry">Retry the quiz</button>`}
        </div>
      </div>
    `;
  }

  // ── Active question ──
  const q = questions[qs.currentQ];
  const isLast = qs.currentQ === questions.length - 1;

  const dotsHtml = questions.map((_, i) => {
    let cls = 'q-dot';
    let content = i + 1;
    if (i < qs.answers.length) {
      cls += qs.answers[i] ? ' q-correct' : ' q-wrong';
      content = qs.answers[i] ? '✓' : '✗';
    } else if (i === qs.currentQ) {
      cls += ' q-active';
    }
    return `${i > 0 ? '<div class="q-connector"></div>' : ''}<div class="${cls}">${content}</div>`;
  }).join('');

  const optsHtml = q.opts.map((opt, i) => {
    let cls = 'option';
    if (qs.confirmed) {
      if (i === q.correct) cls += ' opt-correct';
      else if (i === qs.selected) cls += ' opt-wrong';
    } else if (i === qs.selected) {
      cls += ' opt-selected';
    }
    const clickable = qs.confirmed ? '' : `data-action="quiz-select" data-opt="${i}"`;
    return `<div class="${cls}" ${clickable}>
      <div class="opt-letter">${letters[i]}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join('');

  const actionBtn = qs.confirmed
    ? (isLast
        ? `<button class="btn-primary" data-action="quiz-finish">See results →</button>`
        : `<button class="btn-primary" data-action="quiz-next">Next question →</button>`)
    : `<button class="btn-primary" data-action="quiz-confirm" ${qs.selected === null ? 'disabled' : ''}>Confirm answer</button>`;

  return `
    <div class="quiz-wrap">
      <div class="quiz-header">
        <div class="mo-badge">Module ${state.module} Quiz</div>
        <div class="quiz-title">${m.title} — Quiz</div>
        <div class="quiz-desc">Answer all 5 questions to complete this module. You need 4 out of 5 correct to move on.</div>
        <div class="quiz-rules">
          <span class="quiz-rule">5 questions</span>
          <span class="quiz-rule">4/5 to pass</span>
          <span class="quiz-rule">No time limit</span>
        </div>
      </div>

      <div class="q-dots-row">${dotsHtml}</div>

      <div class="question-card">
        <div class="q-label">Question ${qs.currentQ + 1} of ${questions.length}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">${optsHtml}</div>
        <div class="quiz-actions">${actionBtn}</div>
      </div>
    </div>
  `;
}

// ─── CERT EXAM ────────────────────────────────────────────────────────────────

function renderCertExam() {
  const total = examState.questions.length;
  const m = Math.floor(examState.timeLeft / 60);
  const s = examState.timeLeft % 60;
  const timeStr = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  const questionsHtml = examState.questions.map((q, qi) => {
    const selected = examState.answers[qi] || [];
    const markerShape = q.multi ? 'square' : 'circle';
    const optsHtml = q.opts.map((opt, oi) => {
      const isSel = selected.includes(oi);
      return `<div class="cert-option${isSel ? ' selected' : ''}" data-action="cert-select" data-qi="${qi}" data-oi="${oi}">
        <div class="cert-option-marker ${markerShape}" style="${isSel ? 'border-color:var(--accent);background:var(--accent);' : ''}"></div>
        <div class="cert-option-text">${opt}</div>
      </div>`;
    }).join('');
    return `
      <div class="cert-question-block" data-qi="${qi}">
        <div class="cert-q-num">Question ${qi + 1} of ${total} &nbsp;·&nbsp; ${q.multi ? 'Select all that apply' : 'Select one'}</div>
        <div class="cert-q-text">${q.q}</div>
        <div class="cert-options">${optsHtml}</div>
      </div>`;
  }).join('');

  const answeredCount = Object.keys(examState.answers).filter(k => (examState.answers[k] || []).length > 0).length;
  const btnStyle = `display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#e8622a;color:white;border-radius:6px;font-size:13px;font-weight:400;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;`;

  return `
    <div class="cert-exam-topbar">
      <div class="cert-timer-col">
        <div class="cert-timer-label">Time remaining</div>
        <div class="cert-timer-display" id="cert-timer">${timeStr}</div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);">${total} questions · 90% to pass</div>
    </div>
    <div class="cert-exam-wrap">
      ${questionsHtml}
      <div class="cert-exam-bottom">
        <span class="cert-answered-label" id="cert-answered-count">${answeredCount} of ${total} questions answered</span>
        <a style="${btnStyle}" data-action="submit-exam">Submit answers →</a>
      </div>
    </div>
  `;
}

// ─── CERT RESULT ──────────────────────────────────────────────────────────────

function renderCertResult() {
  const score = examState.score;
  const total = examState.questions.length;
  const pct = Math.round((score / total) * 100);
  const passed = examState.passed;
  const failTitles = ['Almost there.', 'Keep going.', 'So close.'];
  const failTitle = failTitles[Math.floor(Math.random() * failTitles.length)];

  const reviewHtml = examState.questions.map((q, qi) => {
    const selected = examState.answers[qi] || [];
    const correct = q.correct;
    const isFullyCorrect = selected.slice().sort().join(',') === correct.slice().sort().join(',');

    const optsHtml = q.opts.map((opt, oi) => {
      const userSelected = selected.includes(oi);
      const isCorrect = correct.includes(oi);
      let cls = 'neutral', badge = '';

      if (passed) {
        if (isCorrect && userSelected) { cls = 'correct'; badge = '<span class="cert-review-badge">✓ your answer</span>'; }
        else if (!isCorrect && userSelected) { cls = 'wrong'; badge = '<span class="cert-review-badge">✗ your answer</span>'; }
        else if (isCorrect && !userSelected) { cls = 'correct'; }
      } else {
        if (isFullyCorrect && userSelected) { cls = 'correct'; badge = '<span class="cert-review-badge">✓ correct</span>'; }
        else if (!isCorrect && userSelected) { cls = 'wrong'; badge = '<span class="cert-review-badge">✗ your answer</span>'; }
      }

      return `<div class="cert-review-opt ${cls}">${opt}${badge}</div>`;
    }).join('');

    return `
      <div class="cert-review-q">
        <div class="cert-review-qtext">${qi + 1}. ${q.q}</div>
        ${optsHtml}
      </div>`;
  }).join('');

  const btnStyle = `display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#e8622a;color:white;border-radius:6px;font-size:13px;font-weight:400;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;`;
  const secBtnStyle = `display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:transparent;color:var(--text-secondary);border:1px solid var(--border);border-radius:6px;font-size:13px;font-weight:400;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;`;

  return `
    <div class="cert-wrap">
      <div class="cert-result-banner ${passed ? 'pass' : 'fail'}">
        <div class="cert-result-icon">
          ${passed
            ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6dbf86" stroke-width="2.5"><path d="M5 12l5 5 9-9"/></svg>`
            : `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e57373" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>`}
        </div>
        <div>
          <div class="cert-result-title">${passed ? 'Certification passed.' : failTitle}</div>
          <div class="cert-result-sub">${score} out of ${total} correct · ${pct}% — ${passed ? 'above' : 'below'} the 90% threshold</div>
        </div>
      </div>

      <p class="content-p">${passed
        ? 'Congratulations. You are now an official Levitask Certified Partner. Below is a full review of your exam — correct answers are highlighted in green, incorrect answers in red.'
        : 'You did not reach the 90% pass mark this time. Below is a review of your answers — questions you got wrong are marked in red. The correct answers are not shown. Use this to identify your weak areas, revisit the relevant training sections, and try again.'
      }</p>

      <div class="content-divider"></div>
      ${reviewHtml}

      <div class="cert-result-bottom">
        ${passed
          ? `<span></span><a style="${btnStyle}" data-action="go-cert">View my certificate →</a>`
          : `<a style="${secBtnStyle}" data-action="go-cert-intro">‹ Back to exam overview</a><a style="${btnStyle}" data-action="go-cert-exam">Retake the exam →</a>`
        }
      </div>
    </div>
  `;
}

// ─── CERT DISPLAY ─────────────────────────────────────────────────────────────

function renderCert() {
  const certId = getCertId();
  const userData = (() => { try { return JSON.parse(localStorage.getItem('levitask_user') || '{}'); } catch(e) { return {}; } })();
  const firstName = userData.firstName || '';
  const lastName = userData.lastName || '';
  const fullName = (firstName || lastName) ? `${firstName} ${lastName}`.trim() : 'Certified Partner';
  const jobTitle = userData.jobTitle || '';
  const company = userData.company || '';
  const roleCompany = [jobTitle, company].filter(Boolean).join(' · ') || 'Levitask Distributor';

  const now = new Date();
  const issued = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  const validUntil = new Date(now.setFullYear(now.getFullYear() + 1)).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  const score = examState.score;
  const total = examState.questions.length || 50;
  const pct = Math.round((score / total) * 100);

  const btnStyle = `display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#e8622a;color:white;border-radius:6px;font-size:13px;font-weight:400;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;`;
  const secBtnStyle = `display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:transparent;color:var(--text-secondary);border:1px solid var(--border);border-radius:6px;font-size:13px;font-weight:400;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;`;

  return `
    <div class="cert-display-wrap">
      <div class="cert-frame">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" style="margin:0 auto 20px;display:block;">
          <circle cx="26" cy="26" r="24" stroke="#e8622a" stroke-width="1.5" fill="none"/>
          <path d="M26 14l3.09 6.26L36 21.27l-5 4.87 1.18 6.86L26 30l-6.18 3-1.18-6.86L14 21.27l6.91-1.01z" stroke="#e8622a" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        </svg>
        <div class="cert-frame-label">Certificate of Completion</div>
        <div class="cert-frame-brand">LEVITASK</div>
        <div class="cert-frame-title">Certified Vision Chair<br>Partner</div>
        <div class="cert-frame-awarded">Awarded to</div>
        <div class="cert-frame-name">${fullName}</div>
        <div class="cert-frame-role">${roleCompany}</div>
        <div class="cert-frame-divider"></div>
        <div class="cert-frame-body">This certifies that the above individual has successfully completed the Levitask Distributor Training Program and demonstrated comprehensive knowledge of the Vision Chair, Elevated Seating technology, and the Levitask sales methodology.</div>
        <div class="cert-frame-meta">
          <div>
            <div class="cert-meta-label">Score</div>
            <div class="cert-meta-value">${pct}% — ${score}/${total}</div>
          </div>
          <div>
            <div class="cert-meta-label">Date issued</div>
            <div class="cert-meta-value">${issued}</div>
          </div>
          <div>
            <div class="cert-meta-label">Valid until</div>
            <div class="cert-meta-value">${validUntil}</div>
          </div>
        </div>
        <div class="cert-frame-id">${certId}</div>
      </div>

      <div class="cert-display-bottom">
        <a style="${secBtnStyle}" data-action="go-cert-result">‹ Back to exam review</a>
        <a style="${btnStyle}" id="download-cert-btn">Download certificate (PDF) →</a>
      </div>
    </div>
  `;
}

// ─── EVENT DELEGATION ────────────────────────────────────────────────────────

function attachListeners() {
  document.getElementById('app').addEventListener('click', handleClick);
}

function handleClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const moduleId = parseInt(el.dataset.module);
  const sectionId = parseInt(el.dataset.section);

  switch (action) {
    case 'go-home':
      goHome();
      break;
    case 'go-module':
      goModuleOverview(moduleId);
      break;
    case 'go-section':
      goSection(moduleId, sectionId);
      break;
    case 'start-training':
      goModuleOverview(1);
      break;
    case 'continue-training':
      goModuleOverview(currentActiveModule());
      break;
    case 'start-module':
      startModule(moduleId);
      break;
    case 'go-quiz':
      quizState = { currentQ: 0, selected: null, confirmed: false, score: 0, answers: [], done: false };
      state.view = 'quiz';
      render();
      break;
    case 'quiz-select':
      if (!quizState.confirmed) {
        quizState.selected = parseInt(el.dataset.opt);
        render();
      }
      break;
    case 'quiz-confirm': {
      if (quizState.selected === null) break;
      const questions = QUIZZES[state.module] || [];
      const qItem = questions[quizState.currentQ];
      const isCorrect = quizState.selected === qItem.correct;
      if (isCorrect) quizState.score++;
      quizState.answers.push(isCorrect);
      quizState.confirmed = true;
      render();
      break;
    }
    case 'quiz-next':
      quizState.currentQ++;
      quizState.selected = null;
      quizState.confirmed = false;
      render();
      break;
    case 'quiz-finish':
      quizState.done = true;
      if (quizState.score >= 4) {
        const mp = progress.moduleProgress[state.module];
        mp.status = 'completed';
        mp.quizScore = quizState.score;
        if (state.module < 5) {
          if (progress.moduleProgress[state.module + 1].status === 'locked' ||
              !progress.moduleProgress[state.module + 1].status) {
            progress.moduleProgress[state.module + 1].status = 'not-started';
          }
        }
        saveProgress(progress);
      }
      render();
      break;
    case 'quiz-retry':
      quizState = { currentQ: 0, selected: null, confirmed: false, score: 0, answers: [], done: false };
      render();
      break;
    case 'go-recap':
      state.view = 'recap';
      render();
      break;
    case 'go-cert-intro':
      state.view = 'cert-intro';
      render();
      break;
    case 'go-cert-exam':
      startExam();
      break;
    case 'submit-exam':
      submitExam();
      break;
    case 'cert-select': {
      const qi = parseInt(el.dataset.qi);
      const oi = parseInt(el.dataset.oi);
      const q = examState.questions[qi];
      if (!examState.answers[qi]) examState.answers[qi] = [];
      if (q.multi) {
        const idx = examState.answers[qi].indexOf(oi);
        if (idx > -1) examState.answers[qi].splice(idx, 1);
        else examState.answers[qi].push(oi);
      } else {
        examState.answers[qi] = [oi];
      }
      updateCertOption(qi, oi);
      break;
    }
    case 'go-cert':
      state.view = 'cert';
      render();
      break;
    case 'go-cert-result':
      state.view = 'cert-result';
      render();
      break;
    case 'recap-next-module':
      goModuleOverview(moduleId);
      break;
    case 'next-section': {
      const mp = progress.moduleProgress[moduleId];
      if (!mp.sectionsCompleted) mp.sectionsCompleted = [];
      if (!mp.sectionsCompleted.includes(sectionId)) {
        mp.sectionsCompleted.push(sectionId);
      }
      mp.status = 'in-progress';
      saveProgress(progress);
      state.section = sectionId + 1;
      render();
      break;
    }
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────

render();
</script>
</body>
</html>
